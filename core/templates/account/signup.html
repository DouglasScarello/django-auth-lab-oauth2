{% extends "core/base.html" %}

{% block title %}Registrar - Django Lab{% endblock %}

{% block content %}
<style>
    .auth-container {
        min-height: calc(100vh - 4rem);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        background: var(--bs-body-bg);
        border: 1px solid var(--bs-border-color);
        border-radius: 20px;
        padding: 3rem;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    .form-control {
        padding: 0.75rem 1rem;
        border-radius: 12px;
        background-color: var(--bs-tertiary-bg);
        border: 1px solid var(--bs-border-color);
    }

    .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }
</style>

<div class="auth-container">
    <div class="auth-card glass-card">
        <h1 class="h2 mb-2 text-center">🚀 Junte-se ao Lab</h1>
        <p class="text-center text-secondary small mb-5">Crie sua conta e comece a publicar hoje mesmo</p>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                {{ form.as_p }}
            </div>

            <div class="d-grid mb-3 mt-4">
                <button type="submit" class="btn btn-premium btn-lg fs-6">Criar Conta</button>
            </div>
            
            <p class="text-center small">
                Já tem uma conta? <a href="{% url 'account_login' %}" class="text-primary text-decoration-none fw-semibold">Fazer login</a>
            </p>
        </form>
    </div>
</div>

<script>
    // Estilizar o form.as_p do Django via JS para evitar refazer a view/form agora
    document.querySelectorAll('.auth-card form p input').forEach(input => {
        input.classList.add('form-control', 'mb-3');
    });
    document.querySelectorAll('.auth-card form p label').forEach(label => {
        label.classList.add('form-label', 'small', 'fw-bold');
    });
</script>
{% endblock %}
