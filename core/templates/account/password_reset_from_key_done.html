{% extends "core/base.html" %}
{% load i18n %}

{% block title %}{% trans "Password Changed" %}{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-card text-center">
        <div class="display-1 mb-4">✅</div>
        <h1 class="h2 mb-3">Senha Alterada!</h1>
        <p class="text-secondary mb-5">
            Sua senha foi redefinida com sucesso. Agora você já pode acessar sua conta com a nova credencial.
        </p>
        
        <div class="d-grid">
            <a href="{% url 'account_login' %}" class="btn btn-premium btn-lg fs-6">Entrar no Lab</a>
        </div>
    </div>
</div>

<style>
    .auth-container {
        min-height: calc(100vh - 4rem);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .auth-card {
        background: var(--bs-body-bg);
        border: 1px solid var(--bs-border-color);
        border-radius: 20px;
        padding: 4rem 3rem;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
</style>
{% endblock %}
